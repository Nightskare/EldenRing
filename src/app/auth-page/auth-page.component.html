<div class="auth-container">
    <div class="field">
        <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput>
        </mat-form-field>
    </div>
    <div class="field">
        <mat-form-field>
            <mat-label>Password</mat-label>
            <input matInput [type]="hide ? 'password' : 'text'">
            <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide"></button>
        </mat-form-field>
    </div>
    <div>
        <div>
            <button mat-raised-button color="primary">Connexion</button>
        </div>
        <div>
            <button mat-raised-button color="primary">S'inscrire</button>
        </div>
    </div>
</div>
